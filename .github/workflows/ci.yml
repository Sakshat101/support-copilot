name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply schema
        run: psql postgresql://postgres:postgres@localhost:5432/copilot -f app/db/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/copilot
          LLM_PROVIDER: ollama
        run: pytest -q
